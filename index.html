<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VoiceThing</title>
    <meta name="description" content="Know when your voice is used without permission. Join the VoiceThing waitlist.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="VoiceThing">
    <meta property="og:description" content="Know when your voice is used without permission.">
    <meta property="og:url" content="https://voice-thing.vercel.app">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="VoiceThing">
    <meta name="twitter:description" content="Know when your voice is used without permission.">
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div class="signal-backdrop" aria-hidden="true">
      <span style="--i: 0"></span>
      <span style="--i: 1"></span>
      <span style="--i: 2"></span>
      <span style="--i: 3"></span>
      <span style="--i: 4"></span>
      <span style="--i: 5"></span>
      <span style="--i: 6"></span>
      <span style="--i: 7"></span>
      <span style="--i: 8"></span>
      <span style="--i: 9"></span>
      <span style="--i: 10"></span>
      <span style="--i: 11"></span>
      <span style="--i: 12"></span>
      <span style="--i: 13"></span>
      <span style="--i: 14"></span>
      <span style="--i: 15"></span>
    </div>
    <main class="page-shell" aria-labelledby="page-title">
      <header class="site-header">
        <a class="brand" href="/" aria-label="VoiceThing home">
          <span class="brand-mark">V</span>
          <span>VoiceThing</span>
        </a>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Identity monitoring for your voice</p>
          <h1 id="page-title">Know when your voice is used without permission.</h1>
        </div>

        <div class="waitlist-card">
          <div class="card-orbit" aria-hidden="true"></div>
          <p class="card-kicker">Private beta</p>
          <p class="subtitle">Join the waitlist.</p>
          <form class="signup" id="waitlist-form">
          <label class="sr-only" for="email">Email address</label>
          <div class="signup-row">
            <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            <button type="submit">Request access</button>
          </div>
          <p class="form-status" data-form-status role="status" aria-live="polite"></p>
        </form>
        </div>
      </section>
    </main>
  </body>
</html>
